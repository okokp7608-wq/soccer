<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 vs 체코 승부 예측소 - 사다리타기 v2</title>
    <style>
        body {
            background-color: #f7f5f0;
            background-image: radial-gradient(#e3dec3 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px dashed #8c735c;
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Times New Roman', serif;
            font-size: 42px;
            color: #1a3c5a;
            margin: 0;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 20px;
            color: #8c735c;
            margin: 10px 0 0;
            font-weight: normal;
        }

        .main-layout {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        /* 왼쪽: 참가자 명단 */
        .sidebar-left {
            width: 220px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd3c4;
            max-height: 650px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: bold;
            color: #8c735c;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd3c4;
            padding-bottom: 5px;
        }

        .player-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 8px;
            background: #faf9f5;
            border-radius: 6px;
            border: 1px solid #eae6df;
            transition: all 0.2s;
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
        }

        .kick-btn {
            background-color: #1a3c5a;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .kick-btn:hover {
            background-color: #2a527a;
        }

        .kick-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 중앙: 사다리타기 경기장 */
        .game-zone {
            flex-grow: 1;
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            border: 2px solid #8c735c;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .canvas-container {
            position: relative;
            margin-top: 10px;
            background-color: #f9f9f6;
            border: 1px solid #e0dcd3;
            border-radius: 8px;
        }

        canvas {
            display: block;
        }

        /* 오른쪽: AI 나레이션 및 결과 */
        .sidebar-right {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd3c4;
        }

        .panel-title {
            font-size: 15px;
            font-weight: bold;
            color: #1a3c5a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .speaker-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .bg-kr { background-color: #eef5fc; color: #1a3c5a; border: 1px solid #b3d1f2; }
        .bg-cz { background-color: #fdf2f2; color: #c53030; border: 1px solid #feb2b2; }

        #ai-narration {
            font-size: 13px;
            line-height: 1.6;
            color: #555;
            min-height: 180px;
            white-space: pre-line;
        }

        #result-board {
            font-size: 13px;
            max-height: 290px;
            overflow-y: auto;
        }

        .result-entry {
            padding: 6px 0;
            border-bottom: 1px dashed #eae6df;
        }
        .res-name { font-weight: bold; color: #1a3c5a; }
        .res-score { font-weight: bold; color: #d84315; margin-left: 5px;}

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #a38c73;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Introduction to Match Management</h1>
        <h2>대한민국 vs 체코 승부 예측 사다리타기 ⚽</h2>
    </header>

    <div class="main-layout">
        <!-- 왼쪽: 참가자 -->
        <div class="sidebar-left">
            <div class="sidebar-title">📋 킥오프 명단</div>
            <div id="player-list"></div>
        </div>

        <!-- 중앙: 축구 사다리 그라운드 -->
        <div class="game-zone">
            <div style="font-size: 14px; color: #8c735c; font-weight: bold; margin-bottom: 5px;">[그라운드 진입] 각 선수를 클릭해 공을 굴리세요!</div>
            <div class="canvas-container">
                <canvas id="ladderCanvas" width="580" height="500"></canvas>
            </div>
        </div>

        <!-- 오른쪽: AI 캐스터 & 전광판 -->
        <div class="sidebar-right">
            <div class="panel">
                <div class="panel-title">🤖 AI 실시간 무당 분석</div>
                <div id="speaker-box"></div>
                <div id="ai-narration">선수가 슛을 날리면 라인업 피드백 기반 전술 캐스팅이 시작됩니다...</div>
            </div>
            
            <div class="panel">
                <div class="panel-title">📊 경기 예측 전광판</div>
                <div id="result-board">아직 기록된 예측이 없습니다.</div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Soccer Prediction Studio. 본 예측은 재미용이며 라인업 분석 데이터가 포함되어 있습니다.</p>
    </footer>
</div>

<script>
    // 1. 참가자 데이터 설정
    const players = ['권용실', '이희락', '이가희', '김윤상', '류지형', '박기현', '임도연', '문승현', '이은형', '김승재', '김재승', '노도균', '박승주', '이광석', '안준설'];
    const scores = ['2:1', '1:0', '0:0', '2:0', '1:1', '3:2', '0:1', '2:2', '3:1', '1:2', '0:2', '3:0', '1:3', '2:3', '3:3'];

    // 2. 이미지(image_bcc98f.jpg) 기반 양 팀 라인업 데이터 구축
    const krSquad = [
        '7 손흥민', '19 이강인', '10 이재성', '6 황인범', 
        '8 백승호', '22 설영우', '3 이기혁', '4 김민재', 
        '2 이한범', '13 이태석', '1 김승규'
    ];
    
    const czSquad = [
        '10 P. 시크', '15 P. 슐츠', '24 A. 소이카', '22 T. 수첵', 
        '17 L. 프로보드', '20 J. 젤레니', '7 L. 크레이치', '5 V. 쿠팔', 
        '6 Š. 찰로펙', '4 R. 흐라나치', '1 M. 코바르'
    ];

    // 3. 사다리 구조 엔진 초기화
    const canvas = document.getElementById('ladderCanvas');
    const ctx = canvas.getContext('2d');
    
    const numLines = players.length;
    const paddingX = 30;
    const startY = 40;
    const endY = 460;
    const stepX = (canvas.width - paddingX * 2) / (numLines - 1);
    
    const bridges = [];
    const numBridges = 45;
    
    let seed = 54321;
    function randomSeeded() {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    for (let i = 0; i < numBridges; i++) {
        let lineIdx = Math.floor(randomSeeded() * (numLines - 1));
        let h = startY + 30 + randomSeeded() * (endY - startY - 60);
        if (!bridges.some(b => b.line === lineIdx && Math.abs(b.y - h) < 15)) {
            bridges.push({ line: lineIdx, y: h });
        }
    }
    bridges.sort((a, b) => a.y - b.y);

    function drawLadder() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#ddd3c4';
        
        for (let i = 0; i < numLines; i++) {
            let x = paddingX + i * stepX;
            ctx.beginPath();
            ctx.moveTo(x, startY);
            ctx.lineTo(x, endY);
            ctx.stroke();
            
            ctx.fillStyle = '#1a3c5a';
            ctx.font = 'bold 11px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText(players[i][0], x, startY - 22);
            ctx.fillText(players[i].substring(1), x, startY - 8);
            
            ctx.fillStyle = '#8c735c';
            ctx.font = 'bold 12px Georgia';
            ctx.fillText(scores[i], x, endY + 20);
        }
        
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#a38c73';
        bridges.forEach(b => {
            let x1 = paddingX + b.line * stepX;
            let x2 = paddingX + (b.line + 1) * stepX;
            ctx.beginPath();
            ctx.moveTo(x1, b.y);
            ctx.lineTo(x2, b.y);
            ctx.stroke();
        });
    }

    function getPath(startLine) {
        let currentLine = startLine;
        let currentY = startY;
        const path = [{ x: paddingX + currentLine * stepX, y: currentY }];
        
        while (currentY < endY) {
            let nextBridge = bridges.find(b => b.y > currentY && (b.line === currentLine || b.line === currentLine - 1));
            if (nextBridge) {
                currentY = nextBridge.y;
                path.push({ x: paddingX + currentLine * stepX, y: currentY });
                if (nextBridge.line === currentLine) { currentLine++; } else { currentLine--; }
                path.push({ x: paddingX + currentLine * stepX, y: currentY });
            } else {
                currentY = endY;
                path.push({ x: paddingX + currentLine * stepX, y: currentY });
            }
        }
        return { path, finalLine: currentLine };
    }

    let isPlaying = false;
    function animateBall(playerIdx, path, finalScore) {
        isPlaying = true;
        toggleButtons(false);
        
        let pointIdx = 0;
        let currentPos = { x: path[pointIdx].x, y: path[pointIdx].y };
        const speed = 7;
        
        function move() {
            if (pointIdx >= path.length - 1) {
                drawLadder();
                ctx.beginPath();
                ctx.arc(currentPos.x, currentPos.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#d84315';
                ctx.fill();
                finishGame(playerIdx, finalScore);
                return;
            }
            
            let target = path[pointIdx + 1];
            let dx = target.x - currentPos.x;
            let dy = target.y - currentPos.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist <= speed) {
                currentPos.x = target.x;
                currentPos.y = target.y;
                pointIdx++;
            } else {
                currentPos.x += (dx / dist) * speed;
                currentPos.y += (dy / dist) * speed;
            }
            
            drawLadder();
            ctx.beginPath();
            ctx.arc(currentPos.x, currentPos.y, 7, 0, Math.PI * 2);
            ctx.fillStyle = '#1a3c5a';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            
            requestAnimationFrame(move);
        }
        move();
    }

    // 4. 선수 나레이션 및 코멘트 풀
    const playerComments = {
        kr: [
            "위치 선정과 전술적 빌드업이 아주 완벽하게 맞아떨어진 스코어입니다. 이 기세를 몰아서 중원 압박을 유지하면 무조건 우리가 가져옵니다!",
            "측면 공간 침투가 제대로 통할 것 같은 예감이 드네요. 데이터 분석대로만 움직인다면 이번 체코전은 기분 좋은 승리가 될 것입니다."
        ],
        cz: [
            "대한민국의 뒷공간을 노리는 우리의 세트피스와 롱패스 전략이 완벽하게 적중할 때 나올 법한 차가운 현실적 스코어입니다.",
            "중원 압박에서 우리가 우위를 점한다면 스코어보드는 이렇게 흘러갈 확률이 높습니다. 방심하지 말고 피지컬로 밀어붙여야 합니다."
        ],
        draw: [
            "서로 한 치의 양보도 없는 팽팽한 허리싸움이 예상됩니다. 실수 하나가 승패를 가를 만큼 아주 치열한 진흙탕 싸움이 될 것 같군요.",
            "전술 유튜버들과 빅데이터가 가리키는 가장 숨 막히는 스코어입니다. 결국 양 팀 골키퍼의 선방 능력에 따라 이 균형이 깨질 겁니다."
        ]
    };

    function generateNarration(score) {
        let parts = score.split(':');
        let kr = parseInt(parts[0]);
        let cz = parseInt(parts[1]);
        
        let speaker = "";
        let teamClass = "";
        let comment = "";
        
        if (kr > cz) {
            speaker = "🇰🇷 대한민국 " + krSquad[Math.floor(Math.random() * krSquad.length)];
            teamClass = "speaker-badge bg-kr";
            comment = playerComments.kr[Math.floor(Math.random() * playerComments.kr.length)];
        } else if (kr < cz) {
            speaker = "🇨🇿 체코 " + czSquad[Math.floor(Math.random() * czSquad.length)];
            teamClass = "speaker-badge bg-cz";
            comment = playerComments.cz[Math.floor(Math.random() * playerComments.cz.length)];
        } else {
            // 무승부일 때는 양 팀 중 무작위 등판
            if (Math.random() > 0.5) {
                speaker = "🇰🇷 대한민국 " + krSquad[Math.floor(Math.random() * krSquad.length)];
                teamClass = "speaker-badge bg-kr";
            } else {
                speaker = "🇨🇿 체코 " + czSquad[Math.floor(Math.random() * czSquad.length)];
                teamClass = "speaker-badge bg-cz";
            }
            comment = playerComments.draw[Math.floor(Math.random() * playerComments.draw.length)];
        }
        
        return { speaker, teamClass, comment };
    }

    // 5. 경기 종료 및 결과 처리
    const recordedResults = [];
    function finishGame(playerIdx, finalScore) {
        isPlaying = false;
        toggleButtons(true);
        
        let pName = players[playerIdx];
        let narObj = generateNarration(finalScore);
        
        // AI 상단 스피커 및 멘트 업데이트
        document.getElementById('speaker-box').innerHTML = `<span class="${narObj.teamClass}">${narObj.speaker} 인터뷰</span>`;
        document.getElementById('ai-narration').innerText = `🎙️ [캐스터 연결 수집 멘트]\n"${pName}" 선수의 슈팅 결과는 [${finalScore}] 입니다!\n\n"${narObj.comment}"`;
        
        // 전광판 업데이트
        recordedResults.push({ name: pName, score: finalScore });
        const board = document.getElementById('result-board');
        board.innerHTML = recordedResults.map(r => `
            <div class="result-entry">
                🏃 <span class="res-name">${r.name}</span> ➔ <span class="res-score">대한민국 ${r.score} 체코</span>
            </div>
        `).join('');
        
        document.getElementById(`btn-${playerIdx}`).disabled = true;
        document.getElementById(`player-${playerIdx}`).style.opacity = '0.5';
    }

    function toggleButtons(enable) {
        players.forEach((_, idx) => {
            let btn = document.getElementById(`btn-${idx}`);
            if (btn && !btn.disabled) { btn.disabled = !enable; }
        });
    }

    function init() {
        const listContainer = document.getElementById('player-list');
        players.forEach((name, idx) => {
            const div = document.createElement('div');
            div.className = 'player-item';
            div.id = `player-${idx}`;
            div.innerHTML = `
                <span class="player-name">${idx + 1}. ${name}</span>
                <button class="kick-btn" id="btn-${idx}" onclick="startLadder(${idx})">슛팅</button>
            `;
            listContainer.appendChild(div);
        });
        drawLadder();
    }

    window.startLadder = function(idx) {
        if (isPlaying) return;
        let result = getPath(idx);
        let finalScore = scores[result.finalLine];
        animateBall(idx, result.path, finalScore);
    };

    init();
</script>

</body>
</html>
