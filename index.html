<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 vs 체코 승부 예측소 - 사다리타기</title>
    <style>
        /* 수채화풍 디자인 및 축구 테마 블렌딩 */
        body {
            background-color: #f7f5f0;
            background-image: radial-gradient(#e3dec3 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px dashed #8c735c;
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Times New Roman', serif;
            font-size: 42px;
            color: #1a3c5a;
            margin: 0;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 20px;
            color: #8c735c;
            margin: 10px 0 0;
            font-weight: normal;
        }

        .main-layout {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        /* 왼쪽: 참가자 명단 */
        .sidebar-left {
            width: 220px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd3c4;
            max-height: 650px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: bold;
            color: #8c735c;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd3c4;
            padding-bottom: 5px;
        }

        .player-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 8px;
            background: #faf9f5;
            border-radius: 6px;
            border: 1px solid #eae6df;
            transition: all 0.2s;
        }

        .player-item.active {
            background: #eef5fc;
            border-color: #1a3c5a;
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
        }

        .kick-btn {
            background-color: #1a3c5a;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .kick-btn:hover {
            background-color: #2a527a;
        }

        .kick-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 중앙: 사다리타기 경기장 */
        .game-zone {
            flex-grow: 1;
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            border: 2px solid #8c735c;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .canvas-container {
            position: relative;
            margin-top: 10px;
            background-color: #f9f9f6;
            border: 1px solid #e0dcd3;
            border-radius: 8px;
        }

        canvas {
            display: block;
        }

        /* 오른쪽: AI 나레이션 및 결과 */
        .sidebar-right {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd3c4;
        }

        .panel-title {
            font-size: 15px;
            font-weight: bold;
            color: #1a3c5a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #ai-narration {
            font-size: 13px;
            line-height: 1.6;
            color: #555;
            min-height: 150px;
            white-space: pre-line;
        }

        #result-board {
            font-size: 13px;
            max-height: 320px;
            overflow-y: auto;
        }

        .result-entry {
            padding: 6px 0;
            border-bottom: 1px dashed #eae6df;
        }
        .result-entry:last-child { border-bottom: none; }
        .res-name { font-weight: bold; color: #1a3c5a; }
        .res-score { font-weight: bold; color: #d84315; margin-left: 5px;}

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #a38c73;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Introduction to Match Management</h1>
        <h2>대한민국 vs 체코 승부 예측 사다리타기 ⚽</h2>
    </header>

    <div class="main-layout">
        <!-- 왼쪽: 참가자 -->
        <div class="sidebar-left">
            <div class="sidebar-title">📋 킥오프 명단</div>
            <div id="player-list"></div>
        </div>

        <!-- 중앙: 축구 사다리 그라운드 -->
        <div class="game-zone">
            <div style="font-size: 14px; color: #8c735c; font-weight: bold; margin-bottom: 5px;">[그라운드 진입] 각 선수를 클릭해 공을 굴리세요!</div>
            <div class="canvas-container">
                <canvas id="ladderCanvas" width="580" height="500"></canvas>
            </div>
        </div>

        <!-- 오른쪽: AI 캐스터 & 전광판 -->
        <div class="sidebar-right">
            <div class="panel">
                <div class="panel-title">🤖 AI 실시간 무당 분석</div>
                <div id="ai-narration">선수가 슛을 날리면 인터넷 서집 빅데이터 기반 전술 캐스팅이 시작됩니다...</div>
            </div>
            
            <div class="panel">
                <div class="panel-title">📊 경기 예측 전광판</div>
                <div id="result-board">아직 기록된 예측이 없습니다.</div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Soccer Prediction Studio. 본 예측은 재미용이며 과학적 근거가 아주 조금(?) 숨어있을 수 있습니다.</p>
    </footer>
</div>

<script>
    // 1. 데이터 설정
    const players = ['권용실', '이희락', '이가희', '김윤상', '류지형', '박기현', '임도연', '문승현', '이은형', '김승재', '김재승', '노도균', '박승주', '이광석', '안준설'];
    
    // 0:0 ~ 3:3 조합 중 흥미진진한 15가지 스코어 배치 (선수 숫자와 일치)
    const scores = ['2:1', '1:0', '0:0', '2:0', '1:1', '3:2', '0:1', '2:2', '3:1', '1:2', '0:2', '3:0', '1:3', '2:3', '3:3'];

    // 2. 사다리 구조 물리 엔진 초기화
    const canvas = document.getElementById('ladderCanvas');
    const ctx = canvas.getContext('2d');
    
    const numLines = players.length;
    const paddingX = 30;
    const startY = 40;
    const endY = 460;
    const stepX = (canvas.width - paddingX * 2) / (numLines - 1);
    
    // 가로줄(다리) 고정 생성 (다시 실행해도 꼬이지 않게 고정 난수로 맵 생성)
    const bridges = [];
    const numBridges = 45; // 다리 총 개수
    
    // 고정된 시드로 사다리 다리 놓기
    let seed = 12345;
    function randomSeeded() {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    for (let i = 0; i < numBridges; i++) {
        let lineIdx = Math.floor(randomSeeded() * (numLines - 1));
        let h = startY + 30 + randomSeeded() * (endY - startY - 60);
        // 겹침 방지
        if (!bridges.some(b => b.line === lineIdx && Math.abs(b.y - h) < 15)) {
            bridges.push({ line: lineIdx, y: h });
        }
    }
    // Y축 정렬
    bridges.sort((a, b) => a.y - b.y);

    // 3. UI 그리기 함수
    function drawLadder() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 세로줄 및 이름, 스코어 텍스트 기본 스타일
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#ddd3c4';
        
        for (let i = 0; i < numLines; i++) {
            let x = paddingX + i * stepX;
            
            // 세로줄 그리기
            ctx.beginPath();
            ctx.moveTo(x, startY);
            ctx.lineTo(x, endY);
            ctx.stroke();
            
            // 상단 참가자 이름 (세로 배치 위트)
            ctx.fillStyle = '#1a3c5a';
            ctx.font = 'bold 11px Malgun Gothic';
            ctx.textAlign = 'center';
            ctx.fillText(players[i][0], x, startY - 22);
            ctx.fillText(players[i].substring(1), x, startY - 8);
            
            // 하단 스코어 결과
            ctx.fillStyle = '#8c735c';
            ctx.font = 'bold 12px Georgia';
            ctx.fillText(scores[i], x, endY + 20);
        }
        
        // 가로 다리 그리기
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#a38c73';
        bridges.forEach(b => {
            let x1 = paddingX + b.line * stepX;
            let x2 = paddingX + (b.line + 1) * stepX;
            ctx.beginPath();
            ctx.moveTo(x1, b.y);
            ctx.lineTo(x2, b.y);
            ctx.stroke();
        });
    }

    // 4. 경로 추적 알고리즘
    function getPath(startLine) {
        let currentLine = startLine;
        let currentY = startY;
        const path = [{ x: paddingX + currentLine * stepX, y: currentY }];
        
        while (currentY < endY) {
            // 현재 Y 위치보다 아래에 있는 다리 중 가장 가까운 다리 찾기
            let nextBridge = bridges.find(b => b.y > currentY && (b.line === currentLine || b.line === currentLine - 1));
            
            if (nextBridge) {
                // 다리 직전까지 내려감
                currentY = nextBridge.y;
                path.push({ x: paddingX + currentLine * stepX, y: currentY });
                
                // 옆으로 이동
                if (nextBridge.line === currentLine) {
                    currentLine++;
                } else {
                    currentLine--;
                }
                path.push({ x: paddingX + currentLine * stepX, y: currentY });
            } else {
                // 더이상 다리가 없으면 바닥까지 직진
                currentY = endY;
                path.push({ x: paddingX + currentLine * stepX, y: currentY });
            }
        }
        return { path, finalLine: currentLine };
    }

    // 5. 애니메이션 및 축구공 롤링 이펙트
    let isPlaying = false;
    function animateBall(playerIdx, path, finalScore) {
        isPlaying = true;
        toggleButtons(false);
        
        let pointIdx = 0;
        let currentPos = { x: path[pointIdx].x, y: path[pointIdx].y };
        const speed = 6; // 공 구르는 속도
        
        function move() {
            if (pointIdx >= path.length - 1) {
                // 종착지 도착
                drawLadder();
                // 도착지에 축구공 쾅!
                ctx.beginPath();
                ctx.arc(currentPos.x, currentPos.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#d84315';
                ctx.fill();
                
                finishGame(playerIdx, finalScore);
                return;
            }
            
            let target = path[pointIdx + 1];
            let dx = target.x - currentPos.x;
            let dy = target.y - currentPos.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist <= speed) {
                currentPos.x = target.x;
                currentPos.y = target.y;
                pointIdx++;
            } else {
                currentPos.x += (dx / dist) * speed;
                currentPos.y += (dy / dist) * speed;
            }
            
            // 화면 새로 그리며 축구공 궤적 연출
            drawLadder();
            
            // 축구공 모양 심볼 그리기 (수채화 덩어리 느낌의 미니 축구공)
            ctx.beginPath();
            ctx.arc(currentPos.x, currentPos.y, 7, 0, Math.PI * 2);
            ctx.fillStyle = '#1a3c5a';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            
            requestAnimationFrame(move);
        }
        move();
    }

    // 6. AI 인터넷 수집 데이터 기반 전술 나레이션 시스템
    const aiComments = {
        win: [
            " [AI 분석 브리핑]\n최근 체코 수비진의 전술적 균열과 대한민국 유럽파 공격진의 침투 속도를 결합해 도출한 '인터넷 정밀 데이터형' 스코어입니다. 측면 크로스 차단만 성공한다면 승리 확률이 아주 지배적입니다!",
            " [AI 분석 브리핑]\n네티즌들의 긍정 데이터 수치 74%를 반영한 상남자 스코어군요. 황희찬-손흥민 라인의 전환 패스가 적중할 경우, 체코의 장신 빌드업을 순식간에 무력화할 수 있다는 예측입니다."
        ],
        draw: [
            " [AI 분석 브리핑]\n체코의 정통 피지컬 축구와 대한민국의 중원 압박 축구가 정면 충돌할 때 발생하는 전형적인 장기전 구도입니다. 축구 커뮤니티 전문가들이 가장 방어적으로 배팅하는 쫄깃한 스코어네요.",
            " [AI 분석 브리핑]\n0:0 혹은 1:1 같은 무승부는 골키퍼들의 눈부신 선방쇼가 전제됩니다. 전술 유튜버들의 분석에 따르면, 양 팀 모두 후반전 교체 카드 타이밍에 극도로 신중할 때 나올 법한 정밀한 무승부 예측입니다."
        ],
        lose: [
            " [AI 분석 브리핑]\n체코의 세트피스 고공 점프력과 역습 롱패스 효율을 극대화해 시뮬레이션한 냉철한 비관주의적 스코어입니다. 뼈아프지만 우리 대표팀이 수비 밸런스를 잡지 못하면 경고등이 켜질 수 있다는 경각심을 주는 분석입니다."
        ]
    };

    function getAiNarration(score) {
        let parts = score.split(':');
        let kr = parseInt(parts[0]);
        let cz = parseInt(parts[1]);
        
        let pool = aiComments.draw;
        if (kr > cz) pool = aiComments.win;
        if (kr < cz) pool = aiComments.lose;
        
        let randText = pool[Math.floor(Math.random() * pool.length)];
        return `🎯 스코어 [${score}] 매칭 완료!\n\n${randText}`;
    }

    // 7. 게임 종료 및 결과 누적
    const recordedResults = [];
    function finishGame(playerIdx, finalScore) {
        isPlaying = false;
        toggleButtons(true);
        
        let pName = players[playerIdx];
        
        // AI 나레이션 송출
        document.getElementById('ai-narration').innerText = `🎙️ 캐스터 멘트:\n"${pName}" 선수의 예측 슛!\n\n${getAiNarration(finalScore)}`;
        
        // 전광판 업데이트
        recordedResults.push({ name: pName, score: finalScore });
        const board = document.getElementById('result-board');
        board.innerHTML = recordedResults.map(r => `
            <div class="result-entry">
                🏃 <span class="res-name">${r.name}</span> ➔ <span class="res-score">대 한국 ${r.score} 체코</span>
            </div>
        `).join('');
        
        // 버튼 비활성화 (이미 참여한 사람 처리)
        document.getElementById(`btn-${playerIdx}`).disabled = true;
        document.getElementById(`player-${playerIdx}`).style.opacity = '0.5';
    }

    function toggleButtons(enable) {
        players.forEach((_, idx) => {
            let btn = document.getElementById(`btn-${idx}`);
            if (btn && !btn.disabled) {
                btn.disabled = !enable;
            }
        });
    }

    // 8. 초기 빌드 및 클릭 이벤트 바인딩
    function init() {
        const listContainer = document.getElementById('player-list');
        players.forEach((name, idx) => {
            const div = document.createElement('div');
            div.className = 'player-item';
            div.id = `player-${idx}`;
            div.innerHTML = `
                <span class="player-name">${idx + 1}. ${name}</span>
                <button class="kick-btn" id="btn-${idx}" onclick="startLadder(${idx})">슛팅</button>
            `;
            listContainer.appendChild(div);
        });
        
        drawLadder();
    }

    window.startLadder = function(idx) {
        if (isPlaying) return;
        
        // 경로 계산
        let result = getPath(idx);
        let finalScore = scores[result.finalLine];
        
        // 공 굴리기 애니메이션 시작
        animateBall(idx, result.path, finalScore);
    };

    init();
</script>

</body>
</html>
